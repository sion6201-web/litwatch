# litwatch 설정 — 키워드셋만 고치면 됩니다.
# 각 field = 하나의 관심 분야. keywords 안의 항목은 OR로 묶여 검색됩니다.
# 여러 단어 구(phrase)는 그대로 쓰면 자동으로 "..."로 감쌉니다.

# 검색 기간(일). 매주 돌리면 7이 기본. cron이 --since로 덮어쓸 수 있음.
since_days: 7

# NCBI E-utilities API 키(선택). 있으면 rate limit 3→10 req/s. 없으면 비워두세요.
ncbi_api_key: ""
ncbi_email: "sion6201@gmail.com"   # E-utilities 예의상 권장

# 어떤 소스를 쓸지
sources:
  europepmc: true      # 출판논문 + preprint(bioRxiv/medRxiv) 통합, abstract 포함 — 가장 강력
  pubmed: true         # PubMed 권위 소스(출판논문)
  biorxiv: true        # bioRxiv 네이티브 preprint(제목 기반 필터)

# preprint 서버(biorxiv 소스용): biorxiv, medrxiv
preprint_servers: [biorxiv, medrxiv]

# 소스당 최대 수집(과도 수집 방지)
max_per_source: 300

# 리포트(.md/콘솔) 최소 관련성: high | medium | low
# high = 제목에 키워드 / medium = abstract에 2개+ / low = 쿼리엔 걸림.
# CSV에는 항상 전부 저장되고, 이 값은 요약 표시에만 적용된다.
report_min_relevance: medium

fields:
  # ⚠️ bare "cortisol"/"steroid"는 임상·내분비 논문을 대량 끌어오므로
  #    '센싱/검출/결합' 문맥의 구(phrase)로 좁힌다.
  - name: "cortisol/steroid biosensor"
    keywords:
      - cortisol biosensor
      - cortisol sensor
      - cortisol detection
      - cortisol aptamer
      - cortisol binding protein
      - glucocorticoid biosensor
      - steroid biosensor
      - steroid sensing
      - small-molecule biosensor
      - wearable cortisol
      - electrochemical cortisol

  - name: "de novo binder / protein design"
    keywords:
      - de novo protein design
      - de novo binder
      - small molecule binder design
      - ligand binding pocket design
      - RFdiffusion
      - ProteinMPNN
      - LigandMPNN
      - BoltzGen
      - protein binder design
      - diffusion protein design

  - name: "TF biosensor / protein engineering"
    keywords:
      - transcription factor biosensor
      - allosteric transcription factor
      - biosensor directed evolution
      - machine learning protein engineering
      - protein language model
      - deep mutational scanning
      - NTF2 sensor
